name: opencryptopay
description: Provider agnostic Dart implementation of the [OpenCryptoPay](https://github.com/openCryptoPay/landingPage) payment flow for crypto wallets.
version: 0.1.0
repository: https://github.com/cyrix126/opencryptopay
issue_tracker: https://github.com/cyrix126/opencryptopay/issues

environment:
  sdk: ^3.5.0

dependencies:
  bech32:
   git:
     url: https://github.com/cypherstack/bech32.git
     ref: 6a3388ff8f62c1fa5e624bb7f36c8e71fe53428d
  decimal: ^3.2.4
  http: ^1.5.0
  clock: ^1.1.2

dev_dependencies:
  build_runner: ^2.4.0
  mockito: ^5.4.0
  test: ^1.25.0
